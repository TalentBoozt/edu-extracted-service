info.app.name=Talnova EDU Service
info.app.version=1.0.0
info.app.description=Extracted EDU Domain - Talnova Learning Management Platform
info.app.environment=production

spring.application.name=edu-service
spring.data.mongodb.uri=${DATABASE_URI:mongodb://localhost:27017}
spring.data.mongodb.port=${DATABASE_PORT:27017}
spring.data.mongodb.database=${EDU_DATABASE:Talnova}
spring.data.mongodb.auto-index-creation=true

# Redis Configuration
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.username=${REDIS_USERNAME:}
spring.data.redis.ssl.enabled=false

server.port=${SERVER_PORT:3270}

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

# Mail Configuration
spring.mail.host=smtp.zoho.eu
spring.mail.port=${EMAIL_PORT:587}
spring.mail.username=${EMAIL_USERNAME:}
spring.mail.password=${EMAIL_PASSWORD:}
spring.mail.properties.mail.smtp.from=${EMAIL_USERNAME:}
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# File Upload
spring.servlet.multipart.max-file-size=512MB
spring.servlet.multipart.max-request-size=512MB
spring.servlet.multipart.enabled=true

# EDU AI Engine Configuration
edu.ai.provider=HYBRID
edu.ai.opensource.api-key=${OPENLLM_API:APIKEY}
edu.ai.opensource.model=mistralai/Mistral-7B-Instruct-v0.1
edu.ai.fallback.model=gpt-4o-mini
edu.ai.model=${LLM_MODEL:gpt-4o-mini}
edu.ai.pro.model=gemini-2.5-flash
edu.ai.temperature=${LLM_TEMPERATURE:0.7}
edu.ai.openai.api-key=${OPENAI_API_KEY:}
edu.ai.gemini.api-key=${GEMINI_API_KEY:}

# Stripe Configuration
stripe.api.secret-key=${STRIPE_SECRET:}
stripe.api.test-key=${STRIPE_TEST_SECRET:}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:}
stripe.webhook.test-secret=${STRIPE_TEST_WEBHOOK_SECRET:}

# Edu subscription checkout - Stripe Price IDs
stripe.edu.price.pro.monthly=${STRIPE_EDU_PRICE_PRO_MONTHLY:}
stripe.edu.price.pro.yearly=${STRIPE_EDU_PRICE_PRO_YEARLY:}
stripe.edu.price.premium.monthly=${STRIPE_EDU_PRICE_PREMIUM_MONTHLY:}
stripe.edu.price.premium.yearly=${STRIPE_EDU_PRICE_PREMIUM_YEARLY:}
stripe.edu.price.free=${STRIPE_EDU_PRICE_FREE:}

# Edu marketplace
app.frontend.url=${APP_FRONTEND_URL:https://edu.talnova.io}
app.frontend-url=${APP_FRONTEND_URL:https://edu.talnova.io}
app.edu.platform-fee-fraction=${APP_EDU_PLATFORM_FEE_FRACTION:0.10}
app.edu.seeder.enabled=${APP_EDU_SEEDER_ENABLED:false}
app.edu.encryption-key=${APP_EDU_ENCRYPTION_KEY:EncryptedKey#245}

# JWT Configuration
jwt-token.secret=${JWT_SECRET:}
jwt-cookie.secure=true
jwt-cookie.type=Strict
jwt-cookie.domain=talnova.io

# OpenAI/Gemini API keys
openai.api.key=${OPENAI_API_KEY:}
gemini.api.key=${GEMINI_API_KEY:}

# Compression
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,text/css,text/javascript,application/javascript
server.compression.min-response-size=1024

# Async/Tomcat
spring.mvc.async.request-timeout=300000
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=10
server.tomcat.accept-count=100
server.tomcat.max-connections=10000
server.tomcat.connection-timeout=300000

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=when-authorized
management.health.mongo.enabled=true
management.metrics.export.prometheus.enabled=true

# Resilience4j Retry for LLM
resilience4j.retry.instances.llmRetry.max-attempts=3
resilience4j.retry.instances.llmRetry.wait-duration=2s
resilience4j.retry.instances.llmRetry.retry-exceptions=org.springframework.web.reactive.function.client.WebClientResponseException,org.springframework.web.reactive.function.client.WebClientRequestException,java.util.concurrent.TimeoutException
resilience4j.retry.instances.llmRetry.ignore-exceptions=com.talentboozt.edu_service.domains.edu.exception.EduBaseException,org.springframework.web.server.ResponseStatusException

# Cloudflare R2 Storage
r2.endpoint=${R2_ENDPOINT:https://your-id.r2.cloudflarestorage.com}
r2.access-key=${R2_ACCESS_KEY:world}
r2.secret-key=${R2_SECRET_KEY:world}
r2.bucket-name=${R2_BUCKET_NAME:talnova-media}
r2.public-url=${R2_PUBLIC_URL:https://pub-id.r2.dev}

# SSO Integration (disabled = standalone mode)
edu.sso.enabled=false
edu.referral.enabled=false

server.forward-headers-strategy=native
