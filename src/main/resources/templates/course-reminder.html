<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Course Reminder</title>
</head>
<body style="margin: 0; font-family: Arial, sans-serif; background-color: #F5F7F9; color: #3D3D3D;">
<table width="100%" cellpadding="0" cellspacing="0" style="max-width: 600px; margin: auto; background-color: #ffffff; border-radius: 8px; overflow: hidden;">

  <!-- Header -->
  <tr style="background: linear-gradient(135deg, #ff007f, #00e5ff);">
    <td style="padding: 20px; text-align: center;">
      <img src="https://talnova.io/assets/logos/g-l-w.avif" alt="Company Logo" width="120" />
    </td>
  </tr>

  <!-- Content -->
  <tr>
    <td style="padding: 30px;">
      <h2 style="color: #ff007f;">Hi ${employeeName},</h2>

      <p>This is a <strong>${reminderType}</strong> reminder for your upcoming module:</p>

      <table cellpadding="5" style="margin: 20px 0; background-color: #F5F7F9; padding: 15px; border-radius: 6px;">
        <tr>
          <td><strong>Course:</strong></td>
          <td>${courseName}</td>
        </tr>
        <tr>
          <td><strong>Module:</strong></td>
          <td>${moduleName}</td>
        </tr>
        <tr>
          <td><strong>Start Time:</strong></td>
          <td>${startTime}</td>
        </tr>
        <tr>
          <td><strong>Meeting Link:</strong></td>
          <td><a href="${meetingLink}" style="color: #AF7AC5;">Join Here</a></td>
        </tr>
      </table>

      <p>Good luck and see you there!</p>

      <p style="margin-top: 30px;">– Team Talnova</p>
    </td>
  </tr>

  <!-- Footer -->
  <tr style="background-color: #EAEEF2;">
    <td style="padding: 20px; text-align: center; font-size: 12px; color: #7D7D7D;">
      <div style="margin-bottom: 10px;">
        <a href="https://www.facebook.com/people/Talnova/61568541891062/" style="margin: 0 8px;"><img src="https://cdn-icons-png.flaticon.com/24/733/733547.png" alt="Facebook" /></a>
        <a href="https://x.com/Talnova" style="margin: 0 8px;"><img src="https://cdn-icons-png.flaticon.com/24/733/733579.png" alt="Twitter" /></a>
        <a href="https://www.linkedin.com/company/talent-boozt/" style="margin: 0 8px;"><img src="https://cdn-icons-png.flaticon.com/24/733/733561.png" alt="LinkedIn" /></a>
        <a href="https://www.instagram.com/talnova/" style="margin: 0 8px;"><img src="https://cdn-icons-png.flaticon.com/24/15713/15713420.png" alt="Instagram" /></a>
        <a href="https://www.youtube.com/@Talnova" style="margin: 0 8px;"><img src="https://cdn-icons-png.flaticon.com/24/5968/5968852.png" alt="YouTube" /></a>
      </div>
      © ${year} Talnova. All rights reserved.
    </td>
  </tr>
</table>
</body>
</html>
